<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>NeuralRails</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      html, body, #root {
        height: 100%;
        width: 100%;
      }

      body {
        background: #000;
        font-family: 'Inter', system-ui, sans-serif;
        -webkit-font-smoothing: antialiased;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>

    <!-- Simple Overflow Control -->
    <script>
      function updateOverflow() {
        const path = window.location.pathname;

        if (path === "/" || path === "") {
          // Homepage - immersive, no scroll
          document.documentElement.style.overflow = "hidden";
          document.body.style.overflow = "hidden";
        } else {
          // Other pages (like /demo) - allow scrolling
          document.documentElement.style.overflow = "auto";
          document.body.style.overflow = "auto";
        }
      }

      // Run on initial load
      updateOverflow();

      // Re-check when user navigates (for SPA navigation)
      window.addEventListener('popstate', updateOverflow);
      
      // Optional: Listen for hash or manual path changes
      setInterval(updateOverflow, 800);
    </script>
  </body>
</html>
